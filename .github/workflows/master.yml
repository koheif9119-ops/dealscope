# 市場区分マスタ（東証上場銘柄一覧）の月次更新
name: master

on:
  schedule:
    - cron: "0 22 1 * *"   # 毎月（UTC1日22:00 = JST2日7:00ごろ）
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  master:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: pip install -r scripts/requirements.txt

      - name: 市場区分マスタを更新
        working-directory: scripts
        run: python build_master.py

      - name: 変更があればコミット
        run: |
          git config user.name "dealscope-bot"
          git config user.email "dealscope-bot@users.noreply.github.com"
          git add data/master
          if git diff --cached --quiet; then
            echo "変更なし（コミットしません）"
          else
            git commit -m "市場区分マスタ更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d')"
            git push
          fi
